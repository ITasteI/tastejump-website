<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – TasteJump</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/jpeg" href="assets/img/icon.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Analytics: GoatCounter (datenschutzfreundlich, kein Cookie-Banner nötig) -->
  <script data-goatcounter="https://tastegame.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff 10%, var(--accent-2) 45%, var(--accent) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .error-text {
      font-size: 1.15rem;
      color: var(--text-mid);
      max-width: 480px;
      margin: 20px 0 36px;
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="error-page">
    <img src="assets/img/icon.jpg" alt="TasteJump Logo" style="width:72px;height:72px;border-radius:16px;margin-bottom:28px;box-shadow:0 8px 30px rgba(124,92,255,0.35);" />
    <div class="error-code">404</div>
    <p class="error-text">Diese Seite gibt es nicht – vielleicht ist sie in eine andere Zone des Turms gesprungen.</p>
    <a href="/" class="btn btn-primary btn-lg">Zurück zur Startseite</a>
  </main>
</body>
</html>
